experiment:
  database: deprecated
  db_name: deprecated
  autoworkflow: false

embeddings:
  model: all-MiniLM-L12-v2
  model_provider: local

vector_database:
  persist_directory: 

agents:
  plan_agent:
    enable_lakeview: false
    model: plan_agent_model
    max_steps: 10
    run_steps: 0
    tools:
      - bash
      - str_replace_based_edit_tool
      - sequentialthinking
      - task_done

  code_agent:
    enable_lakeview: false
    model: code_agent_model
    max_steps: 200
    run_steps: 1
    tools:
      - bash
      - str_replace_based_edit_tool
      - sequentialthinking
      - task_done

  test_agent:
    enable_lakeview: false
    model: test_agent_model
    max_steps: 10
    run_steps: 1
    tools:
      - sequentialthinking
      - task_done
      - database_compile
      - database_execute

allow_mcp_servers:
  - playwright

mcp_servers:
  playwright:
    command: npx
    args:
      - "@playwright/mcp@0.0.27"

lakeview:
  model: lakeview_model

model_providers:
  anthropic:
    api_key: your_anthropic_api_key
    provider: doubao
  openai:
    base_url: your_base_url
    api_key: your_api_key
    provider: openai
  doubao:
    base_url: your_base_url
    api_key: your_api_key
    provider: doubao
  local:
    base_url: 
    api_key: None
    provider: local

models:
  plan_agent_model:
    model_provider: doubao
    model: qwen3-coder-plus
    max_tokens: 4096
    temperature: 0.0
    top_p: 1
    top_k: 0
    max_retries: 10
    parallel_tool_calls: true

  code_agent_model:
    model_provider: doubao
    model: qwen3-coder-plus
    max_tokens: 4096
    temperature: 0.0
    top_p: 1
    top_k: 0
    max_retries: 10
    parallel_tool_calls: true

  test_agent_model:
    model_provider: doubao
    model: qwen3-coder-plus
    max_tokens: 4096
    temperature: 0.0
    top_p: 1
    top_k: 0
    max_retries: 10
    parallel_tool_calls: true

  lakeview_model:
    model_provider: doubao
    model: qwen3-coder-plus
    max_tokens: 4096
    temperature: 0.0
    top_p: 1
    top_k: 0
    max_retries: 10
    parallel_tool_calls: true
